name: Continuous release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reserve the next patch tag
        id: version
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tag="$(git tag --points-at "$GITHUB_SHA" --list 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [[ -z "$tag" ]]; then
            for attempt in {1..10}; do
              git fetch origin --tags --force
              latest="$(git tag --list 'v*' \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
              version="$(bash scripts/ci/next_patch_version.sh "$latest")"
              tag="v${version}"
              git tag -a "$tag" "$GITHUB_SHA" -m "Reserve Catch Dog ${tag}"
              if git push origin "refs/tags/${tag}"; then
                break
              fi
              git tag -d "$tag"
              tag=""
              sleep "$attempt"
            done
          fi
          [[ -n "$tag" ]] || {
            echo "Could not reserve a release tag after 10 attempts" >&2
            exit 1
          }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Set exported application version
        run: bash scripts/ci/set_release_version.sh "${{ steps.version.outputs.version }}"

      - uses: actions/cache@v4
        with:
          path: .cache/godot
          key: godot-4.6.3-${{ runner.os }}-d0bc2113-3fbe2c0e
      - name: Install pinned Godot and templates
        run: bash scripts/ci/install_godot.sh
      - name: Validate release inputs
        run: |
          bash scripts/dev/validate_docs.sh
          bash scripts/dev/validate_site.sh
          bash scripts/ci/validate_release_config.sh
      - name: Build release archives
        run: bash scripts/ci/build_exports.sh
      - name: Verify checksums
        run: sha256sum --check SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          artifacts=(catch-dog-windows-x86_64.zip catch-dog-macos-universal.zip SHA256SUMS.txt)
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${artifacts[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${artifacts[@]}" \
              --target "$GITHUB_SHA" --title "Catch Dog ${RELEASE_TAG}" \
              --generate-notes --verify-tag
          fi

      - name: Remove tag reserved by a failed run
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          [[ -n "${RELEASE_TAG}" ]] || exit 0
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 && exit 0
          git fetch origin --tags --force
          tag_sha="$(git rev-list -n1 "${RELEASE_TAG}" 2>/dev/null || true)"
          if [[ "$tag_sha" == "$GITHUB_SHA" ]]; then
            git push origin ":refs/tags/${RELEASE_TAG}"
          fi

  deploy-pages:
    needs: release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate site
        run: bash scripts/dev/validate_site.sh
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

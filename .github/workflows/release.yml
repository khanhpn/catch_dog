name: Tagged release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .cache/godot
          key: godot-4.6.3-${{ runner.os }}-d0bc2113-3fbe2c0e
      - name: Install pinned Godot and templates
        run: bash scripts/ci/install_godot.sh
      - name: Validate release inputs
        run: |
          bash scripts/dev/validate_docs.sh
          bash scripts/dev/validate_site.sh
          bash scripts/ci/validate_release_config.sh
      - name: Build release archives
        run: bash scripts/ci/build_exports.sh
      - name: Verify checksums
        run: sha256sum --check SHA256SUMS.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          catch-dog-windows-x86_64.zip
          catch-dog-macos-universal.zip
          SHA256SUMS.txt
          --generate-notes
          --verify-tag
